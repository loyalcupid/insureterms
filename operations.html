<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 페이지 | 보험약관 바로찾기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero" id="hero">
        <nav class="topbar">
          <div class="brand">
            <img class="brand-image" src="./brand-title-reference.png" alt="보험약관 바로찾기" />
          </div>
          <a class="ghost-link" href="./index.html">메인으로 돌아가기</a>
        </nav>

        <section class="hero-grid">
          <div class="hero-copy">
            <p class="badge">관리자 전용 페이지</p>
            <h2>보험약관찾기 운영 현황은 관리자 로그인 후에만 확인할 수 있습니다.</h2>
            <p class="hero-description">
              운영 중인 보험사 연동 현황과 검색 구조, 다음 확장 우선순위를 관리자 페이지 안에서 안전하게 확인할 수 있도록 구성했습니다.
            </p>
          </div>
        </section>
      </header>

      <main>
        <section class="section auth-section" id="admin-login-section">
          <div class="section-head">
            <div>
              <p class="eyebrow">관리자 로그인</p>
              <h3>아이디와 비밀번호를 입력해 주세요</h3>
            </div>
          </div>

          <form id="admin-login-form" class="search-panel admin-login-form">
            <label class="search-label" for="admin-id">아이디</label>
            <input id="admin-id" name="adminId" type="text" autocomplete="username" />

            <label class="search-label" for="admin-password">비밀번호</label>
            <input id="admin-password" name="adminPassword" type="password" autocomplete="current-password" />

            <div class="admin-auth-actions">
              <button type="submit">로그인</button>
              <p id="admin-login-message" class="admin-login-message hidden" aria-live="polite"></p>
            </div>
          </form>
        </section>

        <section class="section hidden" id="admin-section">
          <div class="section-head">
            <div>
              <p class="eyebrow">관리자 운영 화면</p>
              <h3>보험사별 문서 수집과 검색 운영 현황</h3>
            </div>
            <button type="button" id="admin-logout-button" class="secondary-action">로그아웃</button>
          </div>
          <div class="admin-grid" id="admin-grid"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
